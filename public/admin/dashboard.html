<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>डैशबोर्ड — मालाणी हॉस्पिटल एडमिन</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-shell">
  <div class="admin-sidebar" id="sidebar"></div>
  <div class="admin-main">
    <div class="admin-topline"><h2>डैशबोर्ड</h2></div>
    <div id="flash" class="flash"></div>
    <div class="grid2" id="statsGrid">
      <div class="card">लोड हो रहा है...</div>
    </div>
    <div class="card">
      <h3 style="margin-top:0;">🔐 सुरक्षा जानकारी</h3>
      <p class="muted">पासवर्ड को नियमित रूप से बदलते रहें, और <code>JWT_SECRET</code> किसी के साथ शेयर न करें।</p>
      <a href="password.html" class="btn ghost">पासवर्ड बदलें →</a>
    </div>
  </div>
</div>
<script src="admin.js"></script>
<script>
  requireAuth();
  renderSidebar('dashboard');

  (async () => {
    try {
      const res = await fetch('/api/data');
      const data = await res.json();
      document.getElementById('statsGrid').innerHTML = `
        <div class="card">
          <h3 style="margin-top:0;">👨‍⚕️ डॉक्टर्स</h3>
          <p style="font-size:2rem;margin:0;font-weight:700;color:var(--navy);">${data.doctors.length}</p>
          <p class="muted">कुल डॉक्टर कार्ड्स वेबसाइट पर दिख रहे हैं</p>
          <a href="doctors.html" class="btn">प्रबंधित करें →</a>
        </div>
        <div class="card">
          <h3 style="margin-top:0;">📢 सूचनाएं</h3>
          <p style="font-size:2rem;margin:0;font-weight:700;color:var(--navy);">${data.notifications.filter(n=>n.active).length} / ${data.notifications.length}</p>
          <p class="muted">सक्रिय / कुल सूचनाएं (नोटिस बार में दिखती हैं)</p>
          <a href="notifications.html" class="btn">प्रबंधित करें →</a>
        </div>
        <div class="card">
          <h3 style="margin-top:0;">🖼️ साइट फोटो</h3>
          <p style="font-size:2rem;margin:0;font-weight:700;color:var(--navy);">${data.siteImages.length}</p>
          <p class="muted">भवन/बैनर फोटो जो पूरी साइट पर उपयोग होती हैं</p>
          <a href="images.html" class="btn">प्रबंधित करें →</a>
        </div>
        <div class="card">
          <h3 style="margin-top:0;">📝 कंटेंट एडिटर</h3>
          <p class="muted">होम पेज, हमारे बारे में, सेवाएं, सुविधाएं, गैलरी, समीक्षाएं, संपर्क, अपॉइंटमेंट — हर पेज का टेक्स्ट यहां से बदलें।</p>
          <a href="content.html" class="btn">एडिट करें →</a>
        </div>
      `;
    } catch (e) {
      document.getElementById('statsGrid').innerHTML = '<div class="card">डेटा लोड नहीं हो सका।</div>';
    }
  })();
</script>
</body>
</html>
