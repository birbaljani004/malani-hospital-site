<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>पासवर्ड बदलें — मालाणी हॉस्पिटल एडमिन</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-shell">
  <div class="admin-sidebar" id="sidebar"></div>
  <div class="admin-main">
    <div class="admin-topline"><h2>🔒 पासवर्ड बदलें</h2></div>
    <div id="flash" class="flash"></div>
    <div class="card" style="max-width:420px;">
      <form id="pwForm">
        <label>मौजूदा पासवर्ड</label>
        <input type="password" name="currentPassword" required/>
        <label>नया पासवर्ड (कम से कम 8 अक्षर)</label>
        <input type="password" name="newPassword" required minlength="8"/>
        <label>नया पासवर्ड दोबारा लिखें</label>
        <input type="password" name="confirmPassword" required minlength="8"/>
        <button type="submit" class="btn gold" style="margin-top:16px;">पासवर्ड बदलें</button>
      </form>
    </div>
  </div>
</div>
<script src="admin.js"></script>
<script>
  requireAuth();
  renderSidebar('password');

  document.getElementById('pwForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await apiFetch('/admin-password', { method: 'POST', body: {
        currentPassword: fd.get('currentPassword'), newPassword: fd.get('newPassword'), confirmPassword: fd.get('confirmPassword')
      }});
      showFlash('पासवर्ड सफलतापूर्वक बदल दिया गया।');
      e.target.reset();
    } catch (err) { showFlash(err.message, 'error'); }
  });
</script>
</body>
</html>
