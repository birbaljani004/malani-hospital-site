<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>सूचनाएं — मालाणी हॉस्पिटल एडमिन</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div class="admin-shell">
  <div class="admin-sidebar" id="sidebar"></div>
  <div class="admin-main">
    <div class="admin-topline"><h2>📢 सूचनाएं (Notice Bar)</h2></div>
    <div id="flash" class="flash"></div>
    <p class="muted">यह सूचनाएं वेबसाइट के हर पेज के ऊपर स्क्रॉलिंग नोटिस बार में दिखती हैं। "सक्रिय" वाली सूचनाएं ही वेबसाइट पर दिखेंगी।</p>

    <div class="card">
      <h3 style="margin-top:0;">मौजूदा सूचनाएं</h3>
      <div id="notifList"><p class="muted">लोड हो रहा है...</p></div>
    </div>

    <div class="card">
      <h3 style="margin-top:0;">➕ नई सूचना जोड़ें</h3>
      <form id="addForm">
        <label>सूचना टेक्स्ट *</label>
        <textarea name="text" required></textarea>
        <div class="grid2">
          <div><label>लिंक (वैकल्पिक)</label><input type="text" name="link" placeholder="appointment.html"/></div>
          <div><label>फोटो (वैकल्पिक)</label><input type="file" name="image" accept="image/*"/></div>
        </div>
        <label style="margin-top:10px;"><input type="checkbox" name="active" checked style="width:auto;display:inline-block;margin-right:6px;"/> तुरंत सक्रिय करें</label>
        <button type="submit" class="btn gold" style="margin-top:14px;">सूचना जोड़ें</button>
      </form>
    </div>
  </div>
</div>
<script src="admin.js"></script>
<script>
  requireAuth();
  renderSidebar('notifications');

  function itemHTML(n) {
    return `
    <div class="doc-list-item" data-id="${n.id}">
      ${n.image ? `<img class="thumb" src="${n.image}" alt=""/>` : ''}
      <form class="updForm">
        <fieldset>
          <legend>${n.active ? '✅ सक्रिय' : '⛔ निष्क्रिय'}</legend>
          <label>सूचना टेक्स्ट</label>
          <textarea name="text">${n.text}</textarea>
          <div class="grid2">
            <div>
              <label>लिंक</label>
              <input type="text" name="link" value="${(n.link||'').replace(/"/g,'&quot;')}"/>
              <label>क्रम संख्या</label>
              <input type="text" name="order" value="${n.order}" style="max-width:100px;"/>
            </div>
            <div>
              <label>नई फोटो (वैकल्पिक)</label>
              <input type="file" name="image" accept="image/*"/>
              <label style="margin-top:14px;"><input type="checkbox" name="active" style="width:auto;display:inline-block;margin-right:6px;" ${n.active?'checked':''}/> वेबसाइट पर सक्रिय दिखाएं</label>
            </div>
          </div>
          <button type="submit" class="btn gold" style="margin-top:10px;">सेव करें</button>
        </fieldset>
      </form>
      <button type="button" class="btn danger delBtn">हटाएं</button>
    </div>`;
  }

  async function loadNotifs() {
    const res = await fetch('/api/data');
    const data = await res.json();
    const notifs = data.notifications.slice().sort((a,b)=>(a.order||0)-(b.order||0));
    const listEl = document.getElementById('notifList');
    listEl.innerHTML = notifs.map(itemHTML).join('') || '<p class="muted">कोई सूचना नहीं है।</p>';

    listEl.querySelectorAll('.doc-list-item').forEach((item) => {
      const id = item.getAttribute('data-id');
      item.querySelector('.updForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const imgInput = e.target.querySelector('input[type=file]');
        const payload = { id, text: fd.get('text'), link: fd.get('link'), active: fd.get('active') === 'on', order: fd.get('order') };
        if (imgInput.files.length) {
          const { base64, type } = await prepareCompressedInput(imgInput);
          payload.imageBase64 = base64; payload.imageType = type;
        }
        try {
          await apiFetch('/admin-notifications', { method: 'PUT', body: payload });
          showFlash('सूचना अपडेट हो गई।');
          loadNotifs();
        } catch (err) { showFlash(err.message, 'error'); }
      });
      item.querySelector('.delBtn').addEventListener('click', async () => {
        if (!confirm('क्या यह सूचना हटानी है?')) return;
        try {
          await apiFetch('/admin-notifications', { method: 'DELETE', body: { id } });
          showFlash('सूचना हटा दी गई।');
          loadNotifs();
        } catch (err) { showFlash(err.message, 'error'); }
      });
    });
  }
  loadNotifs();

  document.getElementById('addForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const imgInput = e.target.querySelector('input[type=file]');
    const payload = { text: fd.get('text'), link: fd.get('link'), active: fd.get('active') === 'on' };
    if (imgInput.files.length) {
      const { base64, type } = await prepareCompressedInput(imgInput);
      payload.imageBase64 = base64; payload.imageType = type;
    }
    try {
      await apiFetch('/admin-notifications', { method: 'POST', body: payload });
      showFlash('नई सूचना जोड़ी गई।');
      e.target.reset();
      loadNotifs();
    } catch (err) { showFlash(err.message, 'error'); }
  });
</script>
</body>
</html>
