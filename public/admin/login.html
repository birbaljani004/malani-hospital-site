<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>लॉगिन — मालाणी हॉस्पिटल एडमिन</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#132a4d,#1e3a63);">
  <div style="background:#fff;border-radius:14px;padding:36px 34px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(0,0,0,.25);">
    <h2 style="margin:0 0 4px;text-align:center;">🏥 एडमिन पैनल</h2>
    <p style="text-align:center;color:#667;font-size:.86rem;margin:0 0 20px;">मालाणी हॉस्पिटल — वेबसाइट प्रबंधन</p>
    <div id="flash" class="flash error"></div>
    <form id="loginForm">
      <label>यूज़रनेम</label>
      <input type="text" name="username" required autofocus/>
      <label>पासवर्ड</label>
      <input type="password" name="password" required/>
      <button type="submit" class="btn gold" style="width:100%;margin-top:20px;padding:11px;font-weight:700;">लॉगिन करें</button>
    </form>
  </div>
</div>
<script src="admin.js"></script>
<script>
  if (getToken()) window.location.href = '/admin/dashboard.html';

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = new FormData(e.target);
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: form.get('username'), password: form.get('password') })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'लॉगिन विफल');
      setToken(data.token);
      window.location.href = '/admin/dashboard.html';
    } catch (err) {
      showFlash(err.message, 'error');
    }
  });
</script>
</body>
</html>
